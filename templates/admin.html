{% extends 'base.html' %}{% block content %}<section class="pageHead"><h2>Admin Dashboard</h2><p>Requests, Property और Job Alert manage करें</p></section><section class="serviceGrid"><form class="panel" method="post"><h3>Add Job Alert</h3><input name="title" placeholder="Job Title" required><select name="category">{% for c in categories %}<option>{{ c }}</option>{% endfor %}</select><input name="qualification" placeholder="Qualification"><input name="last_date" placeholder="Last Date"><input name="link" placeholder="Apply Link"><textarea name="details" placeholder="Details"></textarea><button>Add Job</button></form><div class="panel"><h3>Latest Enquiries</h3>{% for e in enquiries %}<p><b>{{ e.service }}</b> - {{ e.name }} - {{ e.phone }}<br>{{ e.details }}</p>{% endfor %}</div></section>{% endblock %}
